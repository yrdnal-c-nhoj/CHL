<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- ✅ SEO Meta Tags -->
    <title>BorrowedTime @ Cubist Heart Laboratories</title>
    <meta name="description" content="BorrowedTime is a new clock every day." />
    <meta
      name="keywords"
      content="clock, art, BorrowedTime, Borrowed Time, Cubist Heart Laboratories,react, vite, design, visual, timepiece"
    />
    <meta name="author" content="Cubist Heart Laboratories" />
    <link rel="canonical" href="https://www.cubistheart.com/" />

    <!-- ✅ Open Graph -->
    <meta
      property="og:title"
      content="BorrowedTime @ Cubist Heart Laboratories"
    />
    <meta property="og:description" content="A new clock every day." />
    <meta property="og:url" content="https://www.cubistheart.com/" />
    <meta property="og:type" content="website" />

    <!-- Google Analytics is injected at runtime (see src/analytics.ts) when env + DNT guards pass -->
    <script>
      // Avoid FOUC: hide content while fonts are loading
      document.documentElement.classList.add('fonts-loading');

      const removeFontsLoading = () => {
        document.documentElement.classList.remove('fonts-loading');
      };

      // Hard timeout to ensure we never stay hidden indefinitely
      const fontsLoadingTimeout = setTimeout(removeFontsLoading, 3000);

      if ('fonts' in document) {
        document.fonts.ready.finally(() => {
          clearTimeout(fontsLoadingTimeout);
          removeFontsLoading();
        });
      } else {
        window.addEventListener('load', () => {
          clearTimeout(fontsLoadingTimeout);
          removeFontsLoading();
        });
      }

      // Prevent flash before React hydrates
      document.addEventListener('DOMContentLoaded', () => {
        document.documentElement.classList.add('dom-loaded');
      });
    </script>
    <style>
      /* Critical CSS: Prevent FOUC */
      .fonts-loading body {
        opacity: 0;
      }
      .fonts-loading.dom-loaded body {
        opacity: 1;
        transition: opacity 0.3s ease-in;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
