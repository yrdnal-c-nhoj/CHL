name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint and Type Check
        run: |
          npm run lint
          npm run type-check
          
      - name: Run Tests
        run: npm run test:run
