
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  .container { padding: 1rem 0; font-family: var(--font-sans); }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar input[type="text"] { flex: 1; min-width: 160px; }
  .tag-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-pill { font-size: 12px; padding: 3px 10px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; }
  .filter-pill.active { background: #185FA5; color: #E6F1FB; border-color: #185FA5; }
  .clock-list { display: flex; flex-direction: column; gap: 0; }
  .clock-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .clock-num { font-size: 11px; color: var(--color-text-tertiary); min-width: 28px; text-align: right; }
  .clock-date { font-size: 12px; color: var(--color-text-secondary); min-width: 68px; font-family: var(--font-mono); }
  .clock-title { font-size: 13px; color: var(--color-text-primary); min-width: 160px; flex: 1; }
  .tags-area { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; flex: 2; }
  .tag-pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #E6F1FB; color: #0C447C; display: flex; align-items: center; gap: 4px; }
  .tag-pill button { background: none; border: none; cursor: pointer; padding: 0; color: #185FA5; font-size: 13px; line-height: 1; }
  .add-tag-wrap { display: flex; gap: 4px; align-items: center; }
  .add-tag-wrap input { width: 90px; font-size: 12px; padding: 2px 6px; height: 24px; }
  .add-tag-wrap button { font-size: 12px; padding: 2px 8px; height: 24px; }
  .export-area { margin-top: 1.5rem; }
  .export-area textarea { width: 100%; height: 180px; font-family: var(--font-mono); font-size: 12px; padding: 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); resize: vertical; }
  .stats { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .copy-btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .no-results { font-size: 13px; color: var(--color-text-tertiary); padding: 1rem 0; }
</style>

<div class="container">
  <h2 class="sr-only">Clock Tag Editor</h2>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search clocks…" oninput="render()">
    <button onclick="clearAll()" style="font-size:13px;">Clear all tags</button>
    <button onclick="showExport()" style="font-size:13px; background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info);">
      <i class="ti ti-download" aria-hidden="true"></i> Export JSON
    </button>
  </div>

  <div id="filter-pills" class="tag-filter"></div>
  <div class="stats" id="stats"></div>

  <div id="clock-list" class="clock-list"></div>

  <div id="export-area" class="export-area" style="display:none;">
    <div class="section-label">clock-tags.json — copy into src/context/</div>
    <textarea id="export-json" readonly></textarea>
    <div class="copy-btn-row">
      <button onclick="copyJson()"><i class="ti ti-copy" aria-hidden="true"></i> Copy to clipboard</button>
      <button onclick="document.getElementById('export-area').style.display='none'">Close</button>
    </div>
  </div>
</div>

<script>
const SAMPLE_CLOCKS = [
  { date: "25-04-02", title: "Deep Space Clock" },
  { date: "25-04-03", title: "Moby-Dick Clock" },
  { date: "25-04-04", title: "Heartbeat Clock" },
  { date: "25-04-05", title: "Tall Clock Clock" },
  { date: "25-04-06", title: "Confetti Clock" },
  { date: "25-04-07", title: "Solar System Clock" },
  { date: "25-04-08", title: "Triple Cactus Clock" },
  { date: "25-04-09", title: "Empty Room Clock" },
  { date: "25-04-10", title: "Bar Graph Clock" },
  { date: "25-04-11", title: "Boring Clock" },
  { date: "25-04-12", title: "Magenta Clock" },
  { date: "25-04-13", title: "Pepperoni Pizza Clock" },
  { date: "25-04-14", title: "Blue Brick Clock" },
  { date: "25-04-15", title: "Horizon Clock" },
  { date: "25-04-16", title: "Birthday Cake Clock" },
  { date: "25-04-17", title: "Stripe Clock" },
  { date: "25-04-18", title: "Antarctica Clock" },
  { date: "25-04-19", title: "Sphere Drop Clock" },
  { date: "25-04-20", title: "Cloud Clock" },
  { date: "25-04-21", title: "Peacock Clock" },
  { date: "25-04-22", title: "Bouncing Cube Clock" },
  { date: "25-04-23", title: "Pirate Clock" },
  { date: "25-04-24", title: "Lava Clock" },
  { date: "25-04-25", title: "Band-Aid" },
  { date: "25-04-26", title: "Skew" },
  { date: "25-04-27", title: "Spinning Coin Clock" },
  { date: "25-04-28", title: "Jackson Pollock Clock" },
  { date: "25-04-29", title: "Fireworks" },
  { date: "25-04-30", title: "Bounce Clock" },
  { date: "25-05-01", title: "Slow Lightning Clock" },
  { date: "25-05-02", title: "Scorpion" },
  { date: "25-05-03", title: "Petals" },
  { date: "25-05-04", title: "Phénakisticope Clock" },
  { date: "25-05-05", title: "Warhol GraveCam Clock" },
  { date: "25-05-06", title: "Unruly Clock" },
  { date: "25-05-07", title: "Radar Clock" },
  { date: "25-05-08", title: "Golden Hour Clock" },
  { date: "25-05-09", title: "Whirlpool Clock" },
  { date: "25-05-10", title: "Number Toss" },
];

const clocks = SAMPLE_CLOCKS.map((c, i) => ({ ...c, num: i + 1 }));
const tags = {};
clocks.forEach(c => tags[c.date] = []);

let activeFilter = null;

function allTags() {
  const set = new Set();
  Object.values(tags).forEach(arr => arr.forEach(t => set.add(t)));
  return [...set].sort();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = clocks.filter(c => {
    const matchSearch = !q || c.title.toLowerCase().includes(q) || c.date.includes(q);
    const matchFilter = !activeFilter || (tags[c.date] || []).includes(activeFilter);
    return matchSearch && matchFilter;
  });

  const list = document.getElementById('clock-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No clocks match.</div>';
  } else {
    list.innerHTML = filtered.map(c => {
      const t = tags[c.date] || [];
      const pills = t.map(tag =>
        `<span class="tag-pill">${tag}<button onclick="removeTag('${c.date}','${tag}')" aria-label="remove ${tag}">×</button></span>`
      ).join('');
      return `<div class="clock-row">
        <span class="clock-num">#${c.num}</span>
        <span class="clock-date">${c.date}</span>
        <span class="clock-title">${c.title}</span>
        <div class="tags-area">
          ${pills}
          <div class="add-tag-wrap">
            <input type="text" id="inp-${c.date}" placeholder="add tag…" onkeydown="if(event.key==='Enter')addTag('${c.date}')">
            <button onclick="addTag('${c.date}')"><i class="ti ti-plus" aria-hidden="true"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  const fp = document.getElementById('filter-pills');
  const all = allTags();
  fp.innerHTML = all.length ? all.map(t =>
    `<span class="filter-pill ${activeFilter===t?'active':''}" onclick="toggleFilter('${t}')">${t}</span>`
  ).join('') : '';

  const taggedCount = clocks.filter(c => (tags[c.date]||[]).length > 0).length;
  document.getElementById('stats').textContent =
    `${taggedCount} of ${clocks.length} clocks tagged · ${all.length} unique tags`;
}

function addTag(date) {
  const inp = document.getElementById('inp-' + date);
  const val = inp.value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!val) return;
  if (!tags[date]) tags[date] = [];
  if (!tags[date].includes(val)) tags[date].push(val);
  inp.value = '';
  render();
}

function removeTag(date, tag) {
  tags[date] = (tags[date] || []).filter(t => t !== tag);
  render();
}

function toggleFilter(tag) {
  activeFilter = activeFilter === tag ? null : tag;
  render();
}

function clearAll() {
  if (!confirm('Clear all tags?')) return;
  clocks.forEach(c => tags[c.date] = []);
  activeFilter = null;
  render();
}

function showExport() {
  const out = {};
  Object.entries(tags).forEach(([date, arr]) => {
    if (arr.length > 0) out[date] = arr;
  });
  document.getElementById('export-json').value = JSON.stringify(out, null, 2);
  document.getElementById('export-area').style.display = 'block';
  document.getElementById('export-area').scrollIntoView({ behavior: 'smooth' });
}

function copyJson() {
  const ta = document.getElementById('export-json');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = event.target.closest('button');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.innerHTML = '<i class="ti ti-copy"></i> Copy to clipboard', 1500);
  });
}

render();
</script>
