name: Weekly Security Audit

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: npm audit
        
      - name: Fix vulnerabilities (if possible)
        run: |
          npm audit fix || echo "Some vulnerabilities require manual review"
          
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: fix security vulnerabilities'
          title: 'Weekly Security Audit - Fix Vulnerabilities'
          body: |
            This PR contains automated security fixes from `npm audit fix`.
            
            Run manually: [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          branch: security/audit-fix-${{ github.run_number }}
          delete-branch: true
