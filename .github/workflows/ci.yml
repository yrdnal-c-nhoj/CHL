name: CHL Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm ci
      - name: TypeScript Strict Check
        run: npm run type-check
      - name: ESLint BTS Enforcement
        run: npm run lint
      - name: Production Build Test
        run: npm run build
