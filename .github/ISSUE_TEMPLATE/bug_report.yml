name: Bug report
description: Report a reproducible problem.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail to reproduce it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps are best.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: device
    attributes:
      label: Device/Browser
      description: |
        What device and browser did you see the issue on? (e.g., iPhone 14 Pro, Chrome on Windows 11, etc.)
        All clocks are expected to be responsive and functional on modern desktop and mobile browsers.
